name: CI Test

on:
    pull_request:
        branches: [main]

jobs:
    # Job 1: Figure out which services changed
    detect-changes:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.set-matrix.outputs.matrix }}
            has_changes: ${{ steps.set-matrix.outputs.has_changes }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect changed services
              id: set-matrix
              run: |
                  CHANGED=$(git diff --name-only origin/main...HEAD | grep '/' | cut -d'/' -f1 | sort -u)

                  SERVICES=()
                  for dir in $CHANGED; do
                    if [ -f "$dir/Dockerfile" ]; then
                      SERVICES+=("$dir")
                    fi
                  done

                  if [ ${#SERVICES[@]} -eq 0 ]; then
                    echo "has_changes=false" >> $GITHUB_OUTPUT
                    echo "matrix=[]" >> $GITHUB_OUTPUT
                  else
                    JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -s -c .)
                    echo "has_changes=true" >> $GITHUB_OUTPUT
                    echo "matrix=$JSON" >> $GITHUB_OUTPUT
                  fi

                  echo "Changed services: ${SERVICES[*]}"

    # Job 2: Run tests for each changed service in parallel
    test:
        needs: detect-changes
        if: needs.detect-changes.outputs.has_changes == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
            fail-fast: false
        steps:
            - uses: actions/checkout@v4

            - name: Detect language
              id: lang
              run: |
                  if [ -f "${{ matrix.service }}/go.mod" ]; then
                    echo "lang=go" >> $GITHUB_OUTPUT
                  elif [ -f "${{ matrix.service }}/requirements.txt" ]; then
                    echo "lang=python" >> $GITHUB_OUTPUT
                  elif [ -f "${{ matrix.service }}/package.json" ]; then
                    echo "lang=node" >> $GITHUB_OUTPUT
                  elif [ -f "${{ matrix.service }}/pom.xml" ]; then
                    echo "lang=java" >> $GITHUB_OUTPUT
                  elif [ -f "${{ matrix.service }}/Cargo.toml" ]; then
                    echo "lang=rust" >> $GITHUB_OUTPUT
                  fi

            # --- Go ---
            - uses: actions/setup-go@v5
              if: steps.lang.outputs.lang == 'go'
              with:
                  go-version: "1.21"

            - name: Test Go
              if: steps.lang.outputs.lang == 'go'
              run: |
                  cd ${{ matrix.service }}
                  go build ./...

            # --- Python ---
            - uses: actions/setup-python@v5
              if: steps.lang.outputs.lang == 'python'
              with:
                  python-version: "3.12"

            - name: Test Python
              if: steps.lang.outputs.lang == 'python'
              run: |
                  cd ${{ matrix.service }}
                  pip install -r requirements.txt
                  pytest test_app.py -v

            # --- Node.js ---
            - uses: actions/setup-node@v4
              if: steps.lang.outputs.lang == 'node'
              with:
                  node-version: "20"

            - name: Test Node
              if: steps.lang.outputs.lang == 'node'
              run: |
                  cd ${{ matrix.service }}
                  npm install
                  npm test

            # --- Java ---
            - uses: actions/setup-java@v4
              if: steps.lang.outputs.lang == 'java'
              with:
                  distribution: "temurin"
                  java-version: "21"

            - name: Test Java
              if: steps.lang.outputs.lang == 'java'
              run: |
                  cd ${{ matrix.service }}
                  mvn test

            # --- Rust ---
            - uses: actions-rust-lang/setup-rust-toolchain@v1
              if: steps.lang.outputs.lang == 'rust'

            - name: Test Rust
              if: steps.lang.outputs.lang == 'rust'
              run: |
                  cd ${{ matrix.service }}
                  cargo build
